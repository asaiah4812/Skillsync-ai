{# Optional cotton component — plain HTML/CSS; mobile menu uses data-nav-toggle + static/js/main.js #}
<nav class="bg-white shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <a href="{% url 'core:home' %}" class="text-2xl font-bold text-primary">SkillSwap FUK</a>
                <div class="hidden md:ml-6 md:flex md:space-x-8">
                    <a href="{% url 'core:browse_workers' %}" class="text-gray-900 hover:text-primary px-3 py-2 text-sm font-medium">Find partners</a>
                    <a href="{% url 'core:browse_jobs' %}" class="text-gray-900 hover:text-primary px-3 py-2 text-sm font-medium">Browse requests</a>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <a href="{% url 'accounts:profile' %}" class="text-gray-900 px-3 py-2 text-sm">Profile</a>
                    <a href="{% url 'accounts:logout' %}" class="text-gray-900 px-3 py-2 text-sm">Logout</a>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="text-gray-900 px-3 py-2 text-sm">Login</a>
                    <a href="{% url 'accounts:register' %}" class="bg-primary text-white px-4 py-2 rounded-lg text-sm">Sign up</a>
                {% endif %}
                <button type="button" class="md:hidden p-2 rounded-md text-gray-600" data-nav-toggle="cotton-mobile-nav" aria-label="Menu">☰</button>
            </div>
        </div>
        <div id="cotton-mobile-nav" class="ss-nav-mobile ss-container">
            <a href="{% url 'core:browse_workers' %}">Find partners</a>
            <a href="{% url 'core:browse_jobs' %}">Browse requests</a>
        </div>
    </div>
</nav>
